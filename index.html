<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="UTF-8">

  </head>
  <body>
    <header>
      <div class="card-container header-container">
      <div class="logo">
        <img src="IMAGES\Logo.png">

      <div class="nav-links">

      </div>

        </div>
        <div class="image-area">
